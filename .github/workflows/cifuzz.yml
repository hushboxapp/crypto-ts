name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'fuzz/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/cifuzz.yml'
  schedule:
    - cron: '37 5 * * *'

permissions: {}

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: base64
            sync: '--sync'
          - target: aes-gcm
            sync: ''
          - target: shamir
            sync: ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile fuzz targets
        run: npm run fuzz:build

      - name: Restore fuzz corpus
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer (${{ matrix.target }})
        run: |
          npx jazzer fuzz/dist/fuzz/${{ matrix.target }}.fuzz fuzz/corpus/${{ matrix.target }} ${{ matrix.sync }} -- -max_total_time=180

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crashes-${{ matrix.target }}
          path: |
            crash-*
            leak-*
            oom-*
            timeout-*
            slow-unit-*
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload corpus
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: corpus-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}
          retention-days: 14
